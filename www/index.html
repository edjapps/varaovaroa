<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Varão Varoa</title>

    <!-- Scripts Base -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            background-color: #FDFBF7;
            user-select: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .pb-safe-area {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .pt-safe-area {
            padding-top: env(safe-area-inset-top);
        }

        /* Previne scroll elástico e garante altura total */
        html,
        body {
            overflow: hidden;
            height: 100%;
            position: fixed;
            width: 100%;
        }

        #root {
            height: 100%;
            overflow: hidden;
        }

        /* Match Popup Animations */
        .match-popup-overlay {
            animation: fadeIn 0.3s ease-out;
        }

        .match-popup-content {
            animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .match-heart-bounce {
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
        }

        .match-heart-pulse {
            animation: heartPulse 1.5s ease-in-out infinite;
        }

        .pulse-ring-1 {
            animation: pulseRing 2s ease-out infinite;
        }

        .pulse-ring-2 {
            animation: pulseRing 2s ease-out 0.5s infinite;
        }

        .photo-slide-left {
            animation: slideFromLeft 0.5s ease-out 0.3s both;
        }

        .photo-slide-right {
            animation: slideFromRight 0.5s ease-out 0.3s both;
        }

        .photo-glow {
            animation: photoGlow 2s ease-in-out infinite;
        }

        .connection-hearts {
            animation: fadeInScale 0.4s ease-out 0.5s both;
        }

        .match-text-bounce {
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.6s both;
        }

        .match-text-fade {
            animation: fadeInUp 0.5s ease-out 0.7s both;
        }

        .match-buttons-fade {
            animation: fadeInUp 0.5s ease-out 0.8s both;
        }

        .floating-heart {
            animation: floatHeart 4s ease-in-out infinite;
            opacity: 0;
        }

        .confetti-particle {
            width: 8px;
            height: 12px;
            border-radius: 2px;
            animation: confettiFall 3s ease-in-out infinite;
        }

        .sparkle-1 { animation: sparkle 1.5s ease-in-out infinite; }
        .sparkle-2 { animation: sparkle 1.5s ease-in-out 0.3s infinite; }
        .sparkle-3 { animation: sparkle 1.5s ease-in-out 0.6s infinite; }
        .sparkle-4 { animation: sparkle 1.5s ease-in-out 0.9s infinite; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(20px);
            }
            50% {
                transform: scale(1.05) translateY(-5px);
            }
            70% {
                transform: scale(0.95) translateY(2px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes heartPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        @keyframes slideFromLeft {
            from {
                opacity: 0;
                transform: translateX(-50px) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotate(0);
            }
        }

        @keyframes slideFromRight {
            from {
                opacity: 0;
                transform: translateX(50px) rotate(10deg);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotate(0);
            }
        }

        @keyframes photoGlow {
            0%, 100% {
                box-shadow: 0 10px 40px rgba(214, 123, 107, 0.2);
            }
            50% {
                box-shadow: 0 10px 40px rgba(214, 123, 107, 0.4);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatHeart {
            0% {
                opacity: 0;
                transform: translateY(0) rotate(0deg) scale(0.5);
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) rotate(360deg) scale(1);
            }
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        /* Like Animation Enhancement */
        .like-heart-burst {
            animation: heartBurst 0.6s ease-out forwards;
        }

        @keyframes heartBurst {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.8);
                opacity: 1;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .like-card-exit {
            animation: cardExit 0.5s ease-in-out forwards;
        }

        @keyframes cardExit {
            0% {
                transform: scale(1) translateX(0) rotate(0);
                opacity: 1;
            }
            100% {
                transform: scale(0.9) translateX(100px) rotate(10deg);
                opacity: 0;
            }
        }

        /* Heart particle animations for like burst */
        @keyframes heartParticle0 {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(calc(-50% + 60px), calc(-50% - 80px)) scale(1); opacity: 0; }
        }
        @keyframes heartParticle1 {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(calc(-50% + 80px), calc(-50% + 20px)) scale(1); opacity: 0; }
        }
        @keyframes heartParticle2 {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(calc(-50% - 60px), calc(-50% - 70px)) scale(1); opacity: 0; }
        }
        @keyframes heartParticle3 {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(calc(-50% - 80px), calc(-50% + 30px)) scale(1); opacity: 0; }
        }
    </style>
  <script type="module" crossorigin src="/assets/index-nsM7ybyU.js"></script>
</head>

<body class="bg-[#FDFBF7]">
    <div id="root">
        <div id="loading-screen"
            style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #FDFBF7; padding: 24px;">
            <div
                style="display: flex; flex-direction: column; align-items: center; gap: 24px; max-width: 340px; width: 100%; text-align: center;">
                <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
                    <img src="/icon4.png" alt="Varão Varoa"
                        style="width: 80px; height: 80px; animation: logoPulse 2.2s ease-in-out infinite;" />
                    <div>
                        <p id="loader-verse-text"
                            style="margin: 0; font-size: 14px; color: #332D2B; font-weight: 600;">
                            “Confie no Senhor de todo o coração.”
                        </p>
                        <p id="loader-verse-ref"
                            style="margin-top: 4px; margin-bottom: 0; font-size: 12px; color: #A0938E;">
                            Provérbios 3:5
                        </p>
                        <p
                            style="margin-top: 8px; margin-bottom: 0; font-size: 10px; color: #C2B3AE; letter-spacing: 0.25em; text-transform: uppercase;">
                            ✝ Versículo do dia
                        </p>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 6px; margin-top: 8px;">
                    <span
                        style="width: 8px; height: 8px; border-radius: 999px; background: #D67B6B; animation: dotBounce 1s infinite;"></span>
                    <span
                        style="width: 8px; height: 8px; border-radius: 999px; background: rgba(214,123,107,0.7); animation: dotBounce 1s infinite 0.15s;"></span>
                    <span
                        style="width: 8px; height: 8px; border-radius: 999px; background: rgba(214,123,107,0.5); animation: dotBounce 1s infinite 0.3s;"></span>
                </div>
            </div>
            <style>
                @keyframes logoPulse {
                    0% {
                        transform: scale(1);
                    }
                    50% {
                        transform: scale(1.04);
                    }
                    100% {
                        transform: scale(1);
                    }
                }

                @keyframes dotBounce {
                    0%, 80%, 100% {
                        transform: translateY(0);
                        opacity: 0.4;
                    }
                    40% {
                        transform: translateY(-6px);
                        opacity: 1;
                    }
                }
            </style>
        </div>
    </div>

    <!-- Vite will inject scripts here, but we need the entry point -->

    <script>
        window.process = { env: { API_KEY: '' } };

        var VERSES_OF_DAY = [
            { text: 'Confie no Senhor de todo o coração.', reference: 'Provérbios 3:5' },
            { text: 'O Senhor é meu pastor.', reference: 'Salmos 23:1' },
            { text: 'Tudo posso naquele que me fortalece.', reference: 'Filipenses 4:13' },
            { text: 'Entrega o teu caminho ao Senhor.', reference: 'Salmos 37:5' },
            { text: 'Deus é amor.', reference: '1 João 4:8' },
            { text: 'O amor tudo suporta.', reference: '1 Coríntios 13:7' },
            { text: 'Seja forte e corajoso.', reference: 'Josué 1:9' },
            { text: 'Buscai primeiro o Reino de Deus.', reference: 'Mateus 6:33' },
            { text: 'A alegria do Senhor é a nossa força.', reference: 'Neemias 8:10' },
            { text: 'Guarde o seu coração.', reference: 'Provérbios 4:23' },
            { text: 'O Senhor é a minha luz.', reference: 'Salmos 27:1' },
            { text: 'A fé remove montanhas.', reference: 'Mateus 17:20' },
            { text: 'O choro pode durar uma noite.', reference: 'Salmos 30:5' },
            { text: 'O Senhor luta por você.', reference: 'Êxodo 14:14' },
            { text: 'Em Deus faremos proezas.', reference: 'Salmos 60:12' },
            { text: 'Andamos por fé, não por vista.', reference: '2 Coríntios 5:7' },
            { text: 'A paz de Deus guardará o seu coração.', reference: 'Filipenses 4:7' },
            { text: 'Deus é o nosso refúgio.', reference: 'Salmos 46:1' },
            { text: 'Espere no Senhor.', reference: 'Salmos 27:14' },
            { text: 'O amor lança fora o medo.', reference: '1 João 4:18' },
            { text: 'Bem-aventurados os puros de coração.', reference: 'Mateus 5:8' },
            { text: 'A resposta branda desvia o furor.', reference: 'Provérbios 15:1' },
            { text: 'O Senhor é bom.', reference: 'Salmos 100:5' },
            { text: 'Peça com fé.', reference: 'Tiago 1:6' },
            { text: 'Se Deus é por nós, quem será contra nós?', reference: 'Romanos 8:31' },
            { text: 'O Senhor te abençoe e te guarde.', reference: 'Números 6:24' },
            { text: 'Alegrai-vos sempre.', reference: '1 Tessalonicenses 5:16' },
            { text: 'A sua graça me basta.', reference: '2 Coríntios 12:9' },
            { text: 'O Senhor firma os passos do homem.', reference: 'Salmos 37:23' },
            { text: 'Permaneça no amor.', reference: 'João 15:9' }
        ];

        function getVerseOfDayForToday() {
            try {
                var today = new Date();
                var dateKey = today.toISOString().slice(0, 10);
                var stored = localStorage.getItem('varaovaroa_verse_of_day');
                if (stored) {
                    var parsed = JSON.parse(stored);
                    if (parsed && parsed.date === dateKey && parsed.verse) {
                        return parsed.verse;
                    }
                }
                var day = today.getDate(); // 1-31
                var index = (day - 1) % VERSES_OF_DAY.length;
                var verse = VERSES_OF_DAY[index];
                localStorage.setItem('varaovaroa_verse_of_day', JSON.stringify({ date: dateKey, verse: verse }));
                return verse;
            } catch (e) {
                return VERSES_OF_DAY[0];
            }
        }

        (function () {
            try {
                var verse = getVerseOfDayForToday();
                var textEl = document.getElementById('loader-verse-text');
                var refEl = document.getElementById('loader-verse-ref');
                if (verse && textEl && refEl) {
                    textEl.textContent = '“' + verse.text + '”';
                    refEl.textContent = verse.reference;
                }
            } catch (e) { }
        })();

        window.addEventListener('load', function () {
            setTimeout(function () {
                var loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.style.opacity = '0';
                    loader.style.transition = 'opacity 0.5s ease';
                    setTimeout(function () { loader.style.display = 'none'; }, 500);
                }
            }, 2000);
        });
    </script>
</body>

</html>
